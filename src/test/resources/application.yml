spring:
  datasource:
    url: jdbc:h2:mem:testdb;DB_CLOSE_DELAY=-1;DB_CLOSE_ON_EXIT=false
    driver-class-name: org.h2.Driver
    username: sa
    password:
  jpa:
    hibernate:
      ddl-auto: none
    database-platform: org.hibernate.dialect.H2Dialect
  liquibase:
    change-log: classpath:db/changelog/db.changelog-master.xml
    contexts: test
  jwt:
    secret: test-jwt-secret-key-that-is-at-least-32-characters-long
    expiration: 86400000

management:
  server:
    port: 0

gemini:
  api:
    key: "test"
    timeout: 5
